# Render Blueprint for CareerAI Backend
# This file configures automatic deployment on Render

services:
  # Web Service Configuration
  - type: web
    name: careerai-backend
    env: node
    region: oregon # Change to your preferred region
    plan: free
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 5000
      # Database Configuration - Add these in Render dashboard
      - key: DATABASE_URL
        sync: false # Set manually in dashboard
      - key: DB_HOST
        sync: false
      - key: DB_USER
        sync: false
      - key: DB_PASSWORD
        sync: false
      - key: DB_NAME
        sync: false
      - key: DB_PORT
        value: 5432
      # Secrets - Add these in Render dashboard
      - key: JWT_SECRET
        sync: false
      - key: SESSION_SECRET
        sync: false
      - key: EMAIL_USER
        sync: false
      - key: EMAIL_PASSWORD
        sync: false
      - key: GROQ_API_KEY
        sync: false
      - key: FRONTEND_URL
        sync: false